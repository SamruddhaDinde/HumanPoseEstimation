# ── Dataset ─────────────────────────────────────────────────────────────
dataset_name: person-in-wifi-3d

# Absolute path to the Person-in-WiFi-3D root directory.
# Expected layout:
#   {dataset_root}/
#     train_data/
#       train_data_list.txt
#       csi/        *.mat   (3, 3, 30, 20)
#       keypoint/   *.npy   (n_persons, 14, 3)
#     test_data/
#       test_data_list.txt
#       csi/
#       keypoint/
dataset_root: /workspace/Person-in-WiFi-3D

# ── Multi-person settings ───────────────────────────────────────────────
# Restricted to single-person scenarios for fair VST-Pose comparison.
# VST-Pose was originally designed for single-person sequential pose
# estimation on MMFi.  Person-in-WiFi 3D's multi-person handling requires
# Hungarian matching (see PiW3D paper, CVPR 2024), which VST-Pose does not
# implement.  We therefore restrict to single-person samples to enable a
# direct numerical comparison against the paper's 1-person benchmark
# (91.7 mm MPJPE).
max_persons: 1
single_person_only: true

# ── Train / Val / Test protocol ─────────────────────────────────────────
# PiW3D ships with only train and test splits.  We carve a deterministic
# 10% slice of the training set as a held-out validation set used to
# select the best checkpoint.  The test set is touched only once, by
# Eval_PiW3D.py, after training completes.
val_fraction: 0.10
val_seed: 42

# ── Model architecture ──────────────────────────────────────────────────
# Number of WiFi packets per CSI segment — must match the dataset value.
num_packets: 20

# Encoder output channels; also the joint-proxy channel count in the
# Transformer.  Set equal to NUM_JOINTS (14) to mirror the MM-Fi convention.
feature_dim: 14

# Feature dimension per channel inside the Transformer blocks.
dim: 128

# ── Loss ────────────────────────────────────────────────────────────────
# Weight on the speed auxiliary loss.
# Keep at 0.0: Person-in-WiFi 3D provides a single per-segment pose ground
# truth, so a velocity target is unavailable.
# Set > 0.0 only if you add a dataloader that returns consecutive-frame pairs.
alpha: 0.0

# ── Data loading ────────────────────────────────────────────────────────
train_loader:
  batch_size: 64
  num_workers: 4

val_loader:
  batch_size: 32
  num_workers: 4

test_loader:
  batch_size: 32
  num_workers: 4

# ── Training ────────────────────────────────────────────────────────────
init_rand_seed: 42
base_learning_rate: 0.0001
total_epoch: 80

# ── Output ──────────────────────────────────────────────────────────────
save_path: pose_weights